{{- if .Values.ai.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudvault.fullname" . }}-ai
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudvault.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai
spec:
  replicas: {{ .Values.ai.replicaCount }}
  selector:
    matchLabels:
      {{- include "cloudvault.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ai
  template:
    metadata:
      labels:
        {{- include "cloudvault.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ai
    spec:
      containers:
        - name: ai
          image: "{{ .Values.ai.repository }}:{{ .Values.ai.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.ai.pullPolicy }}
          ports:
            - name: http
              containerPort: 5005
              protocol: TCP
          env:
            - name: CLOUDVAULT_AI_URL
              value: "http://{{ include "cloudvault.fullname" . }}-ai:{{ .Values.ai.service.port }}"
          # --preload: torch imports once in master process, workers inherit — saves 15s per worker
          # --timeout 120: prevents worker kill during slow inference on first request
          args:
            - "gunicorn"
            - "--workers"
            - "2"
            - "--timeout"
            - "120"
            - "--preload"
            - "--bind"
            - "0.0.0.0:5005"
            - "--access-logfile"
            - "-"
            - "inference_server:app"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            # PyTorch + gunicorn --preload takes ~30-45s on first boot in kind
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            {{- toYaml .Values.ai.resources | nindent 12 }}
{{- end -}}
